services:
  - type: web
    name: smart-farm-backend
    runtime: node
    rootDir: smart-farm/backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false       # Set this in Render Dashboard → Environment
      - key: JWT_SECRET
        sync: false       # Set this in Render Dashboard → Environment
