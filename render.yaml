services:
  - type: web
    name: smart-farm-management-system
    runtime: node
    rootDir: smart-farm
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false       # Set this in Render Dashboard → Environment
      - key: JWT_SECRET
        sync: false       # Set this in Render Dashboard → Environment
